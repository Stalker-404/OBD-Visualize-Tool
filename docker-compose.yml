version: '3.8'

services:
  # 后端服务
  backend:
    image: node:18-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - NODE_ENV=production
    # 直接运行启动命令，省去写 Dockerfile 的麻烦（简单场景适用）
    command: sh -c "npm install && node server.js"
    env_file:
      - .env

  # 前端 & 代理服务
  nginx:
    image: nginx:alpine
    ports:
      - "12315:12315"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend